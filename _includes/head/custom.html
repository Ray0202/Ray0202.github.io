<script>
  (function () {
    var storageKey = "site-theme";
    var media = window.matchMedia("(prefers-color-scheme: dark)");
    var savedTheme = null;

    try {
      savedTheme = window.localStorage.getItem(storageKey);
    } catch (error) {
      savedTheme = null;
    }

    function systemTheme() {
      return media.matches ? "dark" : "light";
    }

    function applyTheme(theme, source) {
      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.setAttribute("data-theme-source", source);

      var toggle = document.querySelector("[data-theme-toggle]");
      if (toggle) {
        var nextTheme = theme === "dark" ? "light" : "dark";
        var label = "Switch to " + nextTheme + " mode";
        toggle.setAttribute("aria-label", label);
        toggle.setAttribute("title", label);
        toggle.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
      }

      var themeColor = document.querySelector("[data-theme-color]");
      if (themeColor) {
        themeColor.setAttribute("content", theme === "dark" ? "#17191d" : "#fbfbfc");
      }
    }

    applyTheme(savedTheme || systemTheme(), savedTheme ? "manual" : "system");

    document.addEventListener("DOMContentLoaded", function () {
      applyTheme(
        document.documentElement.getAttribute("data-theme") || systemTheme(),
        document.documentElement.getAttribute("data-theme-source") || "system"
      );
    });

    document.addEventListener("click", function (event) {
      var target = event.target;
      var toggle = target.closest ? target.closest("[data-theme-toggle]") : null;

      if (!toggle) {
        return;
      }

      var nextTheme =
        document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";

      try {
        window.localStorage.setItem(storageKey, nextTheme);
      } catch (error) {
        // The selected theme still applies for the current page.
      }

      applyTheme(nextTheme, "manual");
    });

    var handleSystemChange = function () {
      var source = document.documentElement.getAttribute("data-theme-source");
      if (source !== "manual") {
        applyTheme(systemTheme(), "system");
      }
    };

    if (media.addEventListener) {
      media.addEventListener("change", handleSystemChange);
    } else if (media.addListener) {
      media.addListener(handleSystemChange);
    }
  })();
</script>
